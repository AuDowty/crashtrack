<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- subtle grid background -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a1f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- alert octagon -->
  <g transform="translate(110, 200) scale(8.5)" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2 7.05 7.05a3 3 0 0 0-.88 2.12v5.66a3 3 0 0 0 .88 2.12L12 22l4.95-4.95a3 3 0 0 0 .88-2.12V9.17a3 3 0 0 0-.88-2.12Z"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="110" font-weight="700" fill="#fafafa">crashtrack</text>

  <!-- tagline -->
  <text x="362" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="36" fill="#a1a1aa">crash reporting for native windows apps</text>

  <!-- footer details -->
  <text x="360" y="425" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#71717a">free · self-hostable · open source · MIT</text>

  <!-- bottom strip -->
  <text x="360" y="500" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#52525b">crashtrack.dev   ·   github.com/AuDowty/crashtrack   ·   crates.io/crates/crashtrack</text>
</svg>
