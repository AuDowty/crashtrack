[package]
name         = "crashtrack"
version      = "0.2.0"
edition      = "2021"
rust-version = "1.75"
license      = "MIT"
description  = "Lightweight Windows crash reporter — uploads minidumps to a crashtrack server"
repository   = "https://github.com/AuDowty/crashtrack"
readme       = "README.md"
homepage     = "https://crashtrack.dev"
documentation = "https://docs.rs/crashtrack"
keywords     = ["crash", "minidump", "windows", "reporting", "telemetry"]
categories   = ["development-tools::debugging", "os::windows-apis"]

[lib]
name = "crashtrack"
path = "src/lib.rs"

[[example]]
name = "demo_crash"
path = "examples/demo_crash.rs"

[features]
default = []

[dependencies]
dirs   = "5"
ureq   = { version = "2.10", default-features = false, features = ["tls"] }
uuid   = { version = "1.11", features = ["v4"] }

[target.'cfg(windows)'.dependencies.windows]
version  = "0.58"
features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_Diagnostics_Debug",
    "Win32_System_Kernel",
    "Win32_System_Memory",
    "Win32_System_Threading",
    "Win32_System_SystemInformation",
]

[profile.release]
opt-level = "s"
lto       = true
codegen-units = 1
