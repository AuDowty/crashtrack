[package]
name        = "crashtrack-parser"
version     = "0.1.0"
edition     = "2021"
license     = "MIT"
description = "WASM PDB symbolicator for crashtrack"
publish     = false

[lib]
name       = "crashtrack_parser"
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen        = "0.2"
serde               = { version = "1", features = ["derive"] }
serde-wasm-bindgen  = "0.6"
pdb                 = "0.8"
goblin              = { version = "0.8", default-features = false, features = ["pe32", "pe64", "std"] }

[profile.release]
opt-level     = "s"
lto           = true
codegen-units = 1
strip         = "debuginfo"
